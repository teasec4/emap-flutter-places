name: emap_hangzhou
description: "Location bookmarking MVP — save places on a map."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.6.2

  # State management
  provider: ^6.1.2

  # Map (OpenStreetMap via flutter_map – no API key needed for MVP)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Deep links for AMap
  url_launcher: ^6.3.1

  # Location
  geolocator: ^13.0.2

  # HTTP for the public POI API
  http: ^1.2.2

  # Marker clustering
  flutter_map_marker_cluster: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
