name: emap_hangzhou
description: "Location bookmarking MVP – save places on a map."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Navigation
  go_router: ^14.6.2

  # State management
  provider: ^6.1.2

  # Local database
  isar_community: ^3.3.2
  isar_community_flutter_libs: ^3.3.2

  # Map (OpenStreetMap via flutter_map – no API key needed for MVP)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Deep links for AMap
  url_launcher: ^6.3.1

  # ID generation
  uuid: ^4.5.1

  # Path utilities
  path_provider: ^2.1.5

  # Location
  geolocator: ^13.0.2

  # HTTP for AMap API
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  isar_community_generator: ^3.3.2
  build_runner: ^2.4.14

flutter:
  uses-material-design: true
